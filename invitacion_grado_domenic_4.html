<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Invitación de Grado - Domenic Shantal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Playfair+Display:wght@500;600;700&family=Great+Vibes&display=swap');

  :root{
    /* ---- paleta femenina / rose gold, tendencia 2026 ---- */
    --vino-profundo: #4a1524;
    --vino-oscuro: #2a0c15;
    --oro-rosa: #d9a679;
    --oro-rosa-claro: #f3d9b8;
    --papel: #fbe9df;
    --papel-sombra: #e8c4b0;
    --rosa-polvo: #e3a6ad;
    --marfil: #fff6ef;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  html, body{
    height: 100%;
  }

  body{
    min-height: 100vh;
    background: radial-gradient(ellipse at 50% 15%, var(--vino-profundo) 0%, var(--vino-oscuro) 75%);
    font-family: 'Cormorant Garamond', serif;
    color: var(--marfil);
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 24px;
    overflow-x: hidden;
  }

  /* ---------- estrellas / brillos de fondo ---------- */
  .stars{
    position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0;
  }
  .stars span{
    position:absolute; width:3px; height:3px; border-radius:50%;
    background: var(--oro-rosa-claro); opacity:.35;
    animation: twinkle 3.5s ease-in-out infinite;
  }
  @keyframes twinkle{ 0%,100%{opacity:.15} 50%{opacity:.6} }

  .stage{
    position:relative;
    width: 100%;
    max-width: 420px;
    z-index: 1;
  }

  /* ---------- SOBRE ---------- */
  .envelope-wrap{
    position:relative;
    width:100%;
    aspect-ratio: 3/2;
    cursor:pointer;
    perspective: 1400px;
    transition: transform .5s ease, opacity .5s ease, filter .5s ease;
  }

  .envelope-wrap.dimmed{
    transform: scale(.94);
    filter: brightness(.55) saturate(.8);
  }

  .envelope-body{
    position:absolute; inset:0;
    background: linear-gradient(160deg, var(--papel) 0%, var(--papel-sombra) 100%);
    border-radius: 6px;
    box-shadow: 0 20px 45px rgba(0,0,0,.5);
  }

  .fold-left, .fold-right{
    position:absolute; top:0; bottom:0; width:52%;
    background: linear-gradient(120deg, rgba(0,0,0,.05), transparent);
    clip-path: polygon(0 0, 100% 50%, 0 100%);
  }
  .fold-left{ left:0; }
  .fold-right{ right:0; transform: scaleX(-1); }

  .fold-bottom{
    position:absolute; left:0; right:0; bottom:0; height:70%;
    background: linear-gradient(0deg, rgba(0,0,0,.10), transparent 70%);
    clip-path: polygon(0 100%, 50% 25%, 100% 100%);
  }

  .flap{
    position:absolute; top:0; left:0; right:0;
    height: 58%;
    background: linear-gradient(160deg, var(--papel-sombra), var(--papel) 60%);
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    transform-origin: top;
    transform-style: preserve-3d;
    transition: transform 1s cubic-bezier(.6,.1,.25,1);
    box-shadow: 0 6px 14px rgba(0,0,0,.15);
    z-index: 5;
  }

  .envelope-wrap.open .flap{
    transform: rotateX(180deg);
    z-index: 1;
  }

  .seal{
    position:absolute;
    top: 50%; left:50%;
    width: 64px; height:64px;
    transform: translate(-50%,-58%);
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #e3a6ad, var(--vino-profundo) 70%);
    box-shadow: 0 4px 10px rgba(0,0,0,.4), inset 0 0 8px rgba(0,0,0,.5);
    display:flex; align-items:center; justify-content:center;
    font-family: 'Great Vibes', cursive;
    font-size: 28px;
    color: var(--oro-rosa-claro);
    z-index: 6;
    transition: transform .5s ease, opacity .5s ease;
  }
  .envelope-wrap.open .seal{
    transform: translate(-50%,-58%) scale(0.4) rotate(25deg);
    opacity:0;
  }

  .tap-hint{
    position:absolute; bottom: -34px; left:0; right:0;
    text-align:center;
    font-size: 15px;
    letter-spacing: 2px;
    color: var(--oro-rosa-claro);
    text-transform: uppercase;
    opacity:.85;
    animation: pulseHint 1.8s ease-in-out infinite;
  }
  @keyframes pulseHint{ 0%,100%{opacity:.4} 50%{opacity:.95} }
  .envelope-wrap.open .tap-hint{ display:none; }

  /* ---------- VOLADORES / SERPENTINA DE GRADUACIÓN ---------- */
  .confetti-container{
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 22;
  }

  .confetti-piece{
    position: absolute;
    top: 0; left: 0;
    opacity: 0;
    will-change: transform, opacity;
    animation: confetti-burst var(--dur, 2s) cubic-bezier(.15,.7,.35,1) forwards;
    animation-delay: var(--delay, 0s);
  }

  .confetti-cap{
    position: absolute;
    top: 0; left: 0;
    font-size: var(--size, 18px);
    opacity: 0;
    will-change: transform, opacity;
    animation: confetti-burst var(--dur, 2s) cubic-bezier(.15,.7,.35,1) forwards;
    animation-delay: var(--delay, 0s);
  }

  @keyframes confetti-burst{
    0%{
      transform: translate(0,0) rotate(0deg);
      opacity: 1;
    }
    22%{
      transform: translate(calc(var(--x) * 0.45), calc(var(--burst) * -1)) rotate(calc(var(--rot) * 0.35));
      opacity: 1;
    }
    100%{
      transform: translate(var(--x), var(--fall)) rotate(var(--rot));
      opacity: 0;
    }
  }

  /* ---------- FONDO OSCURO DETRAS DE LA TARJETA ---------- */
  .backdrop{
    position: fixed;
    inset: 0;
    background: rgba(20, 6, 11, 0);
    backdrop-filter: blur(0px);
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    transition: opacity .6s ease, background .6s ease, backdrop-filter .6s ease;
  }
  .backdrop.show{
    opacity: 1;
    background: rgba(20, 6, 11, .55);
    backdrop-filter: blur(3px);
    pointer-events: auto;
  }

  /* ---------- TARJETA (aparece flotando encima del sobre) ---------- */
  .card-overlay{
    position: fixed;
    top: 50%;
    left: 50%;
    width: min(88vw, 360px);
    max-height: 92vh;
    overflow-y: auto;
    transform: translate(-50%, -46%) scale(.85);
    z-index: 25;
    opacity: 0;
    pointer-events: none;
    transition: transform .7s cubic-bezier(.2,.7,.2,1), opacity .6s ease;
  }
  .card-overlay.show{
    opacity: 1;
    pointer-events: auto;
    transform: translate(-50%, -50%) scale(1);
  }
  .card-overlay::-webkit-scrollbar{ display:none; }

  .card{
    position:relative;
    background: linear-gradient(160deg, var(--vino-profundo), var(--vino-oscuro));
    border: 1px solid var(--oro-rosa);
    border-radius: 6px;
    padding: 34px 22px 30px;
    text-align:center;
    box-shadow: 0 30px 70px rgba(0,0,0,.6);
  }

  .card::before{
    content:"";
    position:absolute; inset:8px;
    border: 1px solid rgba(217,166,121,.5);
    pointer-events:none;
  }

  .close-btn{
    position:absolute;
    top: -14px; right: -14px;
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--oro-rosa);
    color: var(--vino-oscuro);
    border: none;
    font-size: 18px;
    line-height: 1;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,.4);
    z-index: 2;
  }

  .eyebrow{
    font-family:'Playfair Display', serif;
    font-size: 12px;
    letter-spacing: 4px;
    color: var(--oro-rosa-claro);
    text-transform: uppercase;
  }

  .titulo-invitacion{
    font-family: 'Great Vibes', cursive;
    font-size: 40px;
    color: var(--oro-rosa-claro);
    margin: 6px 0 14px;
  }

  .texto-intro{
    font-size: 17px;
    line-height: 1.5;
    color: var(--marfil);
  }

  .nombre-graduada{
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 23px;
    letter-spacing: 1px;
    color: var(--oro-rosa);
    margin: 16px 0 18px;
  }

  .divider{
    width: 60px; height:1px;
    background: var(--oro-rosa);
    margin: 0 auto 18px;
  }

  .detalles{
    display:flex;
    flex-direction:column;
    gap: 10px;
    margin-bottom: 20px;
  }
  .detalle-item{
    font-size: 16px;
    color: var(--marfil);
  }
  .detalle-item b{
    display:block;
    font-family:'Playfair Display', serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--oro-rosa-claro);
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  /* ---------- FOTO ---------- */
  .foto-frame{
    width: 128px; height: 128px;
    margin: 4px auto 10px;
    border-radius: 50%;
    padding: 5px;
    background: conic-gradient(from 180deg, var(--oro-rosa), var(--oro-rosa-claro), var(--oro-rosa));
  }
  .foto-frame-inner{
    width:100%; height:100%;
    border-radius:50%;
    overflow:hidden;
    background: linear-gradient(160deg,#3a1220,#240a12);
    display:flex; align-items:center; justify-content:center;
  }
  .foto-frame-inner img{
    width:100%; height:100%; object-fit:cover; display:block;
  }
  .foto-placeholder{
    color: var(--oro-rosa-claro);
    opacity:.6;
  }
  .foto-placeholder svg{ width:52px; height:52px; }

  .firma{
    font-family:'Great Vibes', cursive;
    font-size: 22px;
    color: var(--oro-rosa-claro);
  }

  @media (prefers-reduced-motion: reduce){
    .flap, .card-overlay, .seal, .backdrop, .envelope-wrap{ transition: none !important; }
    * { animation: none !important; }
  }
</style>
</head>

    <div class="envelope-body"></div>

    <div class="seal">D</div>

      <div class="detalle-item"><b>Hora</b>19:00</div>
    </div>

    <div class="firma">¡Te espero!</div>
  </div>
</div>

<script>
  const wrap = document.getElementById('envelopeWrap');
  const backdrop = document.getElementById('backdrop');
  const cardOverlay = document.getElementById('cardOverlay');
  const closeBtn = document.getElementById('closeBtn');

  function openInvite(){
    wrap.classList.add('open');
    wrap.classList.add('dimmed');
    launchConfetti();
    setTimeout(() => {
      backdrop.classList.add('show');
      cardOverlay.classList.add('show');
      launchConfetti(true);
    }, 550);
  }

  // ---------- voladores / serpentina de graduación ----------
  function launchConfetti(fromCard){
    const container = document.getElementById('confettiContainer');
    let originX, originY;
    if(fromCard){
      originX = window.innerWidth / 2;
      originY = window.innerHeight * 0.18;
    } else {
      const rect = wrap.getBoundingClientRect();
      originX = rect.left + rect.width / 2;
      originY = rect.top + rect.height * 0.42;
    }

    const colors = ['#d9a679', '#f3d9b8', '#e3a6ad', '#fff6ef', '#8a3350', '#c98a63'];
    const total = 70;
    const capCount = 10;

    for(let i = 0; i < total; i++){
      const isCap = i < capCount;
      const el = document.createElement('div');

      // dirección del voladores: explota hacia arriba en abanico
      const angle = (Math.random() * 200 - 100) * (Math.PI / 180); // -100deg a 100deg desde vertical
      const burst = 90 + Math.random() * 160;              // altura del impulso inicial
      const dx = Math.sin(angle) * (60 + Math.random() * 180);
      const fall = burst + 260 + Math.random() * 260;      // caída total tras el impulso
      const rot = (Math.random() > 0.5 ? 1 : -1) * (180 + Math.random() * 540);
      const dur = 1.6 + Math.random() * 1.3;
      const delay = Math.random() * 0.35;

      el.style.setProperty('--x', dx.toFixed(1) + 'px');
      el.style.setProperty('--burst', burst.toFixed(1) + 'px');
      el.style.setProperty('--fall', fall.toFixed(1) + 'px');
      el.style.setProperty('--rot', rot.toFixed(0) + 'deg');
      el.style.setProperty('--dur', dur.toFixed(2) + 's');
      el.style.setProperty('--delay', delay.toFixed(2) + 's');
      el.style.left = originX + 'px';
      el.style.top = originY + 'px';

      if(isCap){
        el.className = 'confetti-cap';
        el.textContent = '🎓';
        el.style.setProperty('--size', (16 + Math.random() * 10).toFixed(0) + 'px');
      } else {
        el.className = 'confetti-piece';
        const color = colors[Math.floor(Math.random() * colors.length)];
        const isStreamer = Math.random() > 0.55;
        if(isStreamer){
          // serpentina: tira larga y delgada
          const w = 4 + Math.random() * 3;
          const h = 18 + Math.random() * 16;
          el.style.width = w + 'px';
          el.style.height = h + 'px';
          el.style.background = color;
          el.style.borderRadius = '2px';
        } else {
          // confeti: cuadrito / rectángulo
          const size = 6 + Math.random() * 6;
          el.style.width = size + 'px';
          el.style.height = (size * (0.5 + Math.random() * 0.9)) + 'px';
          el.style.background = color;
          el.style.borderRadius = Math.random() > 0.5 ? '50%' : '1px';
        }
      }

      container.appendChild(el);
    }

    // limpieza tras la animación
    setTimeout(() => { container.innerHTML = ''; }, 3200);
  }

  function closeInvite(){
    backdrop.classList.remove('show');
    cardOverlay.classList.remove('show');
    setTimeout(() => {
      wrap.classList.remove('open');
      wrap.classList.remove('dimmed');
    }, 400);
  }

  wrap.addEventListener('click', () => {
    if(!wrap.classList.contains('open')){
      openInvite();
    }
  });

  backdrop.addEventListener('click', closeInvite);
  closeBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    closeInvite();
  });

  // estrellas de fondo
  const starsContainer = document.getElementById('stars');
  for(let i=0;i<40;i++){
    const s = document.createElement('span');
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*100+'%';
    s.style.animationDelay = (Math.random()*3.5)+'s';
    starsContainer.appendChild(s);
  }
</script>

</body>
</html>
